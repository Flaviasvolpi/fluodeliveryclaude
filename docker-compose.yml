services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fluodelivery
      POSTGRES_USER: fluodelivery
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fluodelivery}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluodelivery"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Backend API (NestJS) ----
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fluodelivery:${DB_PASSWORD:-fluodelivery}@postgres:5432/fluodelivery?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-esta-chave-em-producao}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-troque-esta-chave-refresh-em-producao}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      PORT: 3000
      NODE_ENV: production
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads

  # ---- Frontend (Nginx + React) ----
  web:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  # ---- Seed (roda uma vez e para) ----
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fluodelivery:${DB_PASSWORD:-fluodelivery}@postgres:5432/fluodelivery?schema=public
    command: >
      sh -c "npx prisma db push --skip-generate && node dist/prisma/seed.js || true"
    restart: "no"

volumes:
  pgdata:
  uploads:
